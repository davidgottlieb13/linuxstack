# ─── Configurer FreeIPA comme serveur DNS ───
- name: "Configuration DNS FreeIPA sur toutes les VMs"
  hosts: lab
  gather_facts: false

  tasks:
    - name: "Définir FreeIPA comme DNS principal sur ens192"
      ansible.builtin.command: >
        nmcli con mod ens192
        ipv4.dns "192.168.10.20"
        ipv4.dns-search "lab.local"
        ipv4.ignore-auto-dns yes

    - name: "Relancer la connexion ens192"
      ansible.builtin.command: nmcli con up ens192

    - name: "Forcer la mise à jour de /etc/resolv.conf"
      ansible.builtin.copy:
        dest: /etc/resolv.conf
        content: |
          # Generated by LinuxStack Pro Lab
          search lab.local
          nameserver 192.168.10.20
          nameserver 8.8.8.8
        owner: root
        group: root
        mode: '0644'

    - name: "Protéger resolv.conf contre l'écrasement"
      ansible.builtin.command: chattr +i /etc/resolv.conf

    - name: "Test de résolution DNS"
      ansible.builtin.command: dig +short ipa.lab.local
      register: dns_test

    - name: "Résultat"
      ansible.builtin.debug:
        msg: "{{ inventory_hostname }} résout ipa.lab.local => {{ dns_test.stdout }}"
