---
# ─── Hardening SSH sur toutes les VMs ───
- name: "Hardening SSH"
  hosts: lab
  gather_facts: true

  tasks:
    - name: "Déployer la bannière SSH"
      ansible.builtin.template:
        src: templates/ssh_banner.j2
        dest: /etc/ssh/banner
        mode: '0644'

    - name: "Sauvegarder la configuration SSH originale"
      ansible.builtin.copy:
        src: /etc/ssh/sshd_config
        dest: /etc/ssh/sshd_config.bak
        remote_src: true
        force: false

    - name: "Déployer la configuration SSH durcie"
      ansible.builtin.template:
        src: templates/sshd_hardened.conf.j2
        dest: /etc/ssh/sshd_config
        mode: '0600'
        validate: '/usr/sbin/sshd -t -f %s'
      notify: restart sshd

    - name: "Vérifier que SSH écoute bien"
      ansible.builtin.wait_for:
        port: 22
        state: started
        timeout: 30

  handlers:
    - name: restart sshd
      ansible.builtin.systemd:
        name: sshd
        state: restarted
